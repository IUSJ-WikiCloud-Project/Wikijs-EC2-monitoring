global:
  scrape_interval: 15s

scrape_configs:
  # Cibles pour les métriques système (Node Exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.13.185:9100'] # Instance 1 (Wiki)
      - targets: ['10.0.0.65:9100'] # Instance 2 (DB)

  # Cibles pour les métriques Docker (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['10.0.13.185:8080']
      - targets: ['10.0.0.65:8080']
